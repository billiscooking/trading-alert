<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交易緊急警報</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    input::placeholder { color: #666; }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 16px;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 20px;
    }
    textarea::placeholder { color: #666; }
    .btn-alert {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #e74c3c;
      color: white;
      transition: background 0.2s;
    }
    .btn-alert:hover { background: #c0392b; }
    .btn-alert:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      white-space: pre-line;
      display: none;
    }
    .status.success { display: block; background: #1e4d2b; }
    .status.error { display: block; background: #4d1e1e; }
    .status.loading { display: block; background: #2e3b4e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>交易緊急警報</h1>
    <p class="subtitle">按下按鈕，撥打電話給所有啟用的團隊成員</p>

    <input type="password" id="accessCode" placeholder="輸入存取碼" />
    <textarea id="message" placeholder="自訂訊息（留空使用預設）"></textarea>

    <button class="btn-alert" id="alertBtn" onclick="triggerAlert()">
      發送緊急警報
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    // ⚠️ 部署 GAS Web App 後，把 URL 貼到這裡
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyNCggS_znk6-JBblOSYS2DxFXW3ptN4CzNZVEcAMK0iDfHEy5Od-nj7bqe-pohgiI/exec";

    async function triggerAlert() {
      const btn = document.getElementById("alertBtn");
      const status = document.getElementById("status");
      const code = document.getElementById("accessCode").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!code) {
        status.className = "status error";
        status.textContent = "請輸入存取碼";
        return;
      }

      btn.disabled = true;
      btn.textContent = "撥打中...";
      status.className = "status loading";
      status.textContent = "正在撥打電話，請稍候...";

      try {
        const res = await fetch(GAS_API_URL, {
          method: "POST",
          body: JSON.stringify({ code, message: message || null }),
          headers: { "Content-Type": "text/plain;charset=utf-8" },
        });

        const data = await res.json();

        if (data.success) {
          const lines = data.results.map(
            (r) => `${r.name} (${r.phone}): ${r.status}`
          );
          status.className = "status success";
          status.textContent = "完成！\n" + lines.join("\n");
        } else {
          status.className = "status error";
          status.textContent = "錯誤：" + data.error;
        }
      } catch (err) {
        status.className = "status error";
        status.textContent = "網路錯誤：" + err.message;
      }

      btn.disabled = false;
      btn.textContent = "發送緊急警報";
    }
  </script>
</body>
</html>
